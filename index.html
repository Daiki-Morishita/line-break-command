<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SubLine – 字幕自動改行ツール</title>
  <meta name="description" content="日本語字幕・テロップ作り専用の自動改行ツール。BudouX AI搭載で最大文字数内で読みやすく分割します。">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="header">
    <div class="header-inner">
      <div class="logo">
        <span class="logo-icon">↵</span>
        <span class="logo-text">SubLine</span>
      </div>
      <span class="tagline">日本語字幕・テロップ作り専用の自動改行ツール</span>
    </div>
  </header>

  <!-- Ad: Top banner -->
  <div class="ad-slot ad-top" id="adTop"></div>

  <main>
    <div class="settings-bar">
      <div class="setting-item">
        <label for="maxChars">最大文字数</label>
        <div class="input-with-unit">
          <input type="number" id="maxChars" value="30" min="5" max="60">
          <span>文字</span>
        </div>
      </div>
      <div class="setting-item">
        <label class="switch">
          <input type="checkbox" id="removePunct">
          <span class="slider"></span>
          <span>句読点削除</span>
        </label>
      </div>
      <div class="setting-item">
        <label class="switch">
          <input type="checkbox" id="removeBlank">
          <span class="slider"></span>
          <span>空白行削除</span>
        </label>
      </div>
      <div class="setting-item">
        <label class="switch">
          <input type="checkbox" id="excludePunct" checked>
          <span class="slider"></span>
          <span>句読点を文字数から除外</span>
        </label>
      </div>
      <div class="setting-item">
        <label class="switch">
          <input type="checkbox" id="punctToSpace">
          <span class="slider"></span>
          <span>句読点「、」を半角スペースに置換</span>
        </label>
      </div>
      <div class="setting-item">
        <button class="btn-replace-toggle" id="replaceToggleBtn">一括置換</button>
      </div>
      <div class="setting-item" id="loaderMsg" style="display:none">
        <span class="loader-text">読み込み中...</span>
      </div>
    </div>

    <div id="charWarning" class="char-warning" style="display:none"></div>

    <div class="replace-bar" id="replaceBar" style="display:none">
      <span class="replace-label">一括置換</span>
      <input type="text" id="findText" placeholder="検索テキスト" class="replace-input">
      <span class="replace-arrow">→</span>
      <input type="text" id="replaceText" placeholder="置換テキスト" class="replace-input">
      <button class="btn-replace" id="replaceBtn">全て置換</button>
      <button class="btn-replace-close" id="closeReplaceBtn">✕</button>
    </div>

    <div class="editor-grid">
      <!-- Left pane: Before -->
      <div class="pane">
        <div class="pane-header">
          <span class="pane-title">元の文章</span>
          <div class="pane-meta">
            <span class="meta-text" id="inputCount">0文字</span>
            <button class="btn-clear" id="clearBtn">クリア</button>
          </div>
        </div>
        <div class="ruler" id="rulerLeft"></div>
        <textarea
          id="inputText"
          class="editor-textarea"
          placeholder="ここにテキストを貼り付けてください..."
          spellcheck="false"
          autocorrect="off"
          autocapitalize="off"
        ></textarea>
      </div>

      <!-- Divider -->
      <div class="divider"><span>›</span></div>

      <!-- Right pane: After -->
      <div class="pane">
        <div class="pane-header">
          <span class="pane-title">変換後</span>
          <div class="pane-meta">
            <span class="meta-text" id="outputCount">0行</span>
            <button class="btn-clear" id="resetBtn">リセット</button>

            <!-- Quote conversion dropdown -->
            <div class="dropdown" id="quoteDropdown">
              <button class="btn-quote" id="quoteBtnToggle">引用符変換 ▾</button>
              <div class="dropdown-menu" id="quoteMenu">
                <button class="dropdown-item" data-quote="kagi-double">「 」→ " "　ダブルクォート</button>
                <button class="dropdown-item" data-quote="kagi-single">「 」→ ' '　シングルクォート</button>
                <button class="dropdown-item" data-quote="kakko-double">『 』→ " "　ダブルクォート</button>
                <button class="dropdown-item" data-quote="kakko-single">『 』→ ' '　シングルクォート</button>
              </div>
            </div>

            <button class="btn-copy" id="copyBtn">コピー</button>

            <!-- Export dropdown -->
            <div class="dropdown" id="exportDropdown">
              <button class="btn-export" id="exportBtnToggle">書き出し ▾</button>
              <div class="dropdown-menu" id="exportMenu">
                <button class="dropdown-item" data-format="txt">.txt　プレーンテキスト</button>
                <button class="dropdown-item" data-format="csv">.csv　CSV（1行1セル）</button>
                <button class="dropdown-item" data-format="srt">.srt　SRT字幕</button>
                <button class="dropdown-item" data-format="vtt">.vtt　WebVTT字幕</button>
                <button class="dropdown-item" data-format="json">.json　JSON配列</button>
              </div>
            </div>
          </div>
        </div>
        <div class="ruler" id="rulerRight"></div>
        <textarea
          id="outputText"
          class="editor-textarea output-textarea"
          placeholder="処理結果がここに表示されます..."
          spellcheck="false"
        ></textarea>
      </div>
    </div>
  </main>

  <!-- Ad: Bottom banner -->
  <div class="ad-slot ad-bottom" id="adBottom"></div>

  <script src="budoux.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
